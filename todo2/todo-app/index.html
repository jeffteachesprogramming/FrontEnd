<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h2>My To-Do List</h2>
    <div class="input-row">
      <input id="task" type="text" placeholder="Add a task..." />
      <button onclick="addTask()">Add</button>
    </div>
    <ul id="list"></ul>
  </div>

  <!-- Confirmation Dialog -->
  <div id="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="confirm-box">
      <p id="confirm-title" class="confirm-title">Delete this task?</p>
      <p class="confirm-task" id="confirm-msg"></p>
      <p class="confirm-sub">This cannot be undone.</p>
      <div class="confirm-actions">
        <button id="confirm-no" class="btn-cancel">No, keep it</button>
        <button id="confirm-yes" class="btn-delete">Yes, delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
